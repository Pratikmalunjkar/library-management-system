services:

  db:
    image: postgres:15-alpine
    container_name: library_db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: library_management
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backend/schema.sql:/docker-entrypoint-initdb.d/schema.sql
    networks:
      - library_network

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: library_backend
    ports:
      - "5000:5000"
    environment:
      DB_HOST: db
      DB_PORT: 5432
      DB_USER: postgres
      DB_PASSWORD: postgres
      DB_NAME: library_management
      JWT_SECRET: super_secret_key_change_me
      EMAIL_USER: pratikmalunjkar570@gmail.com
      EMAIL_PASS: wervjvunwwtumfcq
      ADMIN_EMAIL: pratikmalunjkar570@gmail.com
      PORT: 5000
    depends_on:
      - db
    volumes:
      - ./backend/storage:/app/storage
    networks:
      - library_network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: library_frontend
    ports:
      - "3000:80"
    depends_on:
      - backend
    networks:
      - library_network

volumes:
  postgres_data:

networks:
  library_network:
    driver: bridge